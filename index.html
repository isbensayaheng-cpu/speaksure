<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakSure Mentor</title>
    <style>
        body { font-family: sans-serif; background: #f0f7ff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #mic-btn { width: 100px; height: 100px; border-radius: 50%; border: none; background: #007bff; color: white; font-size: 40px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #mic-btn.active { background: #ff4757; transform: scale(1.1); }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div id="status">Ready! Click the mic.</div>
    <button id="mic-btn">🎤</button>
    <p id="ai-text" style="padding: 20px; text-align: center;"></p>

    <script>
        const API_KEY = "AIzaSyCSRoHI160-pBaQrbMj1F096OWrZ7iExHg";
        const btn = document.getElementById('mic-btn');
        const status = document.getElementById('status');
        const aiText = document.getElementById('ai-text');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("Your browser does not support voice recording. Please use Chrome.");
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';

            btn.onclick = () => {
                recognition.start();
                btn.classList.add('active');
                status.innerText = "Listening...";
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                btn.classList.remove('active');
                status.innerText = "Thinking...";

                try {
                    const response = await fetch(https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: Encourage the student who said: ${transcript} }] }] })
                    });
                    const data = await response.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    aiText.innerText = reply;
                    status.innerText = "Success!";
                    
                    const speech = new SpeechSynthesisUtterance(reply);
                    window.speechSynthesis.speak(speech);
                } catch (err) {
                    status.innerText = "API Error. Check key.";
                    console.error(err);
                }
            };
        }
    </script>
</body>
</html>
