<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakSure Final Fix</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f4; }
        .box { background: white; width: 80%; max-width: 400px; margin: auto; padding: 20px; border-radius: 15px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #start-btn { width: 100px; height: 100px; border-radius: 50%; border: none; background: #007bff; color: white; font-size: 40px; cursor: pointer; }
        #status { margin: 20px 0; font-weight: bold; color: #555; }
        #result { color: #28a745; margin-top: 10px; min-height: 40px; }
        .scaffold { background: #fff3cd; padding: 10px; margin-bottom: 20px; border-radius: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="box">
    <h3>English Mentor</h3>
    <div class="scaffold">
        <b>Scaffolding:</b> Say "Hello Mentor"
    </div>
    
    <button id="start-btn">🎤</button>
    <div id="status">Click to Start</div>
    <div id="result"></div>
    <div id="ai-reply" style="margin-top:20px; border-top:1px solid #ddd; padding-top:10px;"></div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const aiReply = document.getElementById('ai-reply');

    // 1. تعريف المحرك (بأبسط صورة ممكنة لضمان التوافق)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        status.innerText = "Error: Browser not supported";
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = false;

        startBtn.onclick = () => {
            try {
                recognition.start();
                status.innerText = "Listening...";
                startBtn.style.background = "#dc3545";
            } catch (e) {
                console.error(e);
            }
        };

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            result.innerText = "You said: " + transcript;
            status.innerText = "Processing...";
            startBtn.style.background = "#007bff";

            // 2. إرسال النص للذكاء الاصطناعي (Gemini)
            const prompt = You are a mentor. Student said: "${transcript}". Praise them, correct if needed, and give a scaffold for next step. Under 30 words.;
            
            try {
                const response = await fetch(https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyCSRoHI160-pBaQrbMj1F096OWrZ7iExHg, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                aiReply.innerText = "Mentor: " + reply;
                
                // 3. الرد الصوتي (TTS) لتعزيز الكفاءة الذاتية
                const speech = new SpeechSynthesisUtterance(reply);
                speech.lang = 'en-US';
                window.speechSynthesis.speak(speech);
                status.innerText = "Success! Tap to try again.";
                
            } catch (err) {
                aiReply.innerText = "AI Error. Check API Key.";
                status.innerText = "Error!";
            }
        };

        recognition.onerror = (e) => {
            status.innerText = "Error: " + e.error;
            startBtn.style.background = "#007bff";
            if(e.error === 'not-allowed') alert("Please allow microphone access!");
        };
    }
</script>

</body>
</html>
