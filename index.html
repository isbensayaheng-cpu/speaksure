        .container { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; }
        
        /* Scaffolding Section */
        .scaffold-area { background: #e8f4fd; border-left: 5px solid #3498db; padding: 15px; margin-bottom: 30px; border-radius: 10px; font-size: 1.1rem; }
        .label { font-size: 0.75rem; color: #3498db; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        #mic-btn { width: 100px; height: 100px; border-radius: 50%; border: none; background: #3498db; color: white; font-size: 45px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3); }
        #mic-btn.active { background: #e74c3c; transform: scale(1.1); animation: pulse 1.2s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }

        #ai-response { margin-top: 25px; font-size: 1.1rem; line-height: 1.6; color: #2c3e50; min-height: 60px; }
        
        /* Self-efficacy Feedback */
        #reward-badge { display: none; background: #2ecc71; color: white; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; margin-top: 15px; font-weight: bold; }
    </style>
</head>
