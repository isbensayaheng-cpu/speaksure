        .scaffold-box { background: #e7f3ff; border-left: 4px solid #3498db; padding: 15px; margin-bottom: 20px; border-radius: 8px; font-size: 1rem; }
        #mic-btn { width: 90px; height: 90px; border-radius: 50%; border: none; background: #3498db; color: white; font-size: 40px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        #mic-btn.active { background: #ff4757; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #status { margin-top: 15px; color: #7f8c8d; font-weight: bold; }

<body>

<div class="container">
    <div style="font-size: 0.8rem; color: #3498db; margin-bottom: 5px; font-weight: bold;">SCAFFOLDING STEP</div>
    <div class="scaffold-box" id="hint">Try: "I am ready to learn English!"</div>
    
    <button id="mic-btn">🎤</button>
    <div id="status">Tap to speak</div>
    <div id="response">Your Mentor is waiting...</div>
</div>

<script>
    const API_KEY = "AIzaSyCSRoHI160-pBaQrbMj1F096OWrZ7iExHg"; 
    const btn = document.getElementById('mic-btn');
    const status = document.getElementById('status');
    const responseDiv = document.getElementById('response');

    // تفعيل الصوت للآيفون (iOS Fix)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("Speech recognition is not supported on this browser. Please use Safari on iPhone or Chrome on PC.");
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.continuous = false;

        btn.onclick = () => {
            // طلب إذن الميكروفون برمجياً فور الضغط
            recognition.start();
        };

        recognition.onstart = () => {
            btn.classList.add('active');
            status.innerText = "Listening... Speak now!";
        };

        recognition.onresult = async (event) => {
            btn.classList.remove('active');
            const transcript = event.results[0][0].transcript;
            status.innerText = "Processing...";

            const prompt = Student said: "${transcript}". Encourage them (Self-efficacy), give one small tip, and a next sentence scaffold. Max 30 words.;

            try {
                const res = await fetch(https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                responseDiv.innerText = reply;
                status.innerText = "Excellent!";
                
                const speech = new SpeechSynthesisUtterance(reply);
                window.speechSynthesis.speak(speech);
            } catch (e) {
                status.innerText = "Error. Try again.";
            }
        };
