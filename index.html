<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeakSure AI Mentor</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 400px; }
        .scaffold { background: #eef6ff; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid #3498db; }
        #mic-btn { width: 100px; height: 100px; border-radius: 50%; border: none; background: #3498db; color: white; font-size: 40px; cursor: pointer; }
        #mic-btn.active { background: #ff4757; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #status { margin-top: 15px; font-weight: bold; color: #34495e; }
        #response { margin-top: 20px; color: #2c3e50; font-size: 1.1rem; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(52, 152, 219, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

<div id="start-overlay" onclick="initAudio()">
    <h1>Welcome Mentor!</h1>
    <p>Tap anywhere to unlock the Microphone</p>
    <div style="font-size: 50px;">🔓</div>
</div>

<div class="container">
    <div class="scaffold">
        <small style="color:#3498db; display:block;">SCAFFOLDING HINT:</small>
        <strong>"Hello, help me practice English!"</strong>
    </div>
    <button id="mic-btn">🎤</button>
    <div id="status">Ready to listen!</div>
    <div id="response">Your AI Mentor is here...</div>
</div>

<script>
    const API_KEY = "AIzaSyCSRoHI160-pBaQrbMj1F096OWrZ7iExHg"; 
    const micBtn = document.getElementById('mic-btn');
    const statusText = document.getElementById('status');
    const responseDiv = document.getElementById('response');
    const overlay = document.getElementById('start-overlay');

    let recognition;

    // وظيفة فك قفل الصوت (مهمة جداً للآيفون)
    function initAudio() {
        overlay.style.display = 'none';
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("This browser doesn't support Voice. Please use Safari on iPhone.");
            return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = false;

        // تهيئة الصوت بمجرد الضغط (Self-Efficacy)
        const silence = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(silence);
        
        statusText.innerText = "Microphone Unlocked! Tap the icon.";
    }

    micBtn.onclick = () => {
        if (!recognition) return;
        try {
            recognition.start();
        } catch(e) { console.log("Already active"); }
    };

    recognition.onstart = () => {
        micBtn.classList.add('active');
        statusText.innerText = "Listening...";
    };

    recognition.onresult = async (event) => {
        micBtn.classList.remove('active');
        const text = event.results[0][0].transcript;
        statusText.innerText = "Thinking...";

        const prompt = Student said: "${text}". Build their self-efficacy, give a small tip, and a scaffold sentence. Max 30 words.;

        try {
            const res = await fetch(https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}, {

> Israa:
method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            
            responseDiv.innerText = reply;
            statusText.innerText = "Listen!";

            const speech = new SpeechSynthesisUtterance(reply);
            speech.lang = 'en-US';
            window.speechSynthesis.speak(speech);
        } catch (e) {
            statusText.innerText = "Error, try again!";
        }
    };

    recognition.onerror = (e) => {
        micBtn.classList.remove('active');
        statusText.innerText = "Microphone error: " + e.error;
    };
</script>
</body>
</html>
