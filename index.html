<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakSure Mentor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #status-bubble { background: #2ecc71; color: white; padding: 15px 25px; border-radius: 50px; margin-bottom: 20px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        #mic-btn { width: 120px; height: 120px; border-radius: 50%; border: none; background: #007bff; color: white; font-size: 50px; cursor: pointer; box-shadow: 0 6px 20px rgba(0,123,255,0.4); transition: 0.3s; outline: none; display: flex; align-items: center; justify-content: center; }
        #mic-btn.active { background: #e74c3c; transform: scale(1.1); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }
        #ai-reply { margin-top: 30px; text-align: center; padding: 20px; max-width: 80%; color: #2c3e50; font-size: 1.2rem; line-height: 1.6; height: 100px; }
    </style>
</head>
<body>

    <div id="status-bubble">I'm ready! Tap the mic to speak</div>
    <button id="mic-btn">🎤</button>
    <div id="ai-reply">I'll guide you step by step...</div>

        const statusBubble = document.getElementById('status-bubble');
        const aiReply = document.getElementById('ai-reply');

            try {
                recognition.start();
                micBtn.classList.add('active');
                statusBubble.innerText = "Listening... Speak now!";
            } catch (e) {
                console.log("Recognition already started");
            }
        };

                });
