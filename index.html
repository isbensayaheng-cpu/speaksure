<body>

    <div id="status-bubble">Ready! Tap the mic to speak</div>
    <button id="mic-btn">🎤</button>
    <div id="ai-reply">Your English mentor is here...</div>

    <script>
        const API_KEY = "AIzaSyCSRoHI160-pBaQrbMj1F096OWrZ7iExHg"; 
        const micBtn = document.getElementById('mic-btn');
        const statusBubble = document.getElementById('status-bubble');
        const aiReply = document.getElementById('ai-reply');

        // التحقق من دعم المتصفح للصوت
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            statusBubble.style.background = "#e74c3c";
            statusBubble.innerText = "Error: Browser not supported";
            alert("Please use Chrome or Edge for voice features.");
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';

            micBtn.onclick = () => {
                try {
                    recognition.start();
                    micBtn.classList.add('active');
                    statusBubble.innerText = "Listening... Speak now!";
                } catch (e) { console.log("Already listening"); }
            };

            recognition.onresult = async (event) => {
                const userText = event.results[0][0].transcript;
                micBtn.classList.remove('active');
                statusBubble.innerText = "Thinking...";

                const prompt = You are a supportive English mentor. The student said: "${userText}". Validate effort, give brief feedback, and ask a simple follow-up. Under 30 words.;

                try {
                    const response = await fetch(https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    const data = await response.json();
                    const replyText = data.candidates[0].content.parts[0].text;
                    aiReply.innerText = replyText;
                    statusBubble.innerText = "Great! Listen to the reply.";

                    aiReply.innerText = "Connection error. Please try again.";
                    statusBubble.innerText = "Error!";
                }
            };
